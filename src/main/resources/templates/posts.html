<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Posts</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<h2>Posts</h2>

	<table border="1">
	<tr>
	    <th>ID</th>
	    <th>User</th>
	    <th>Content</th>
	</tr>

	<tr th:each="p : ${posts}">
	    <td th:text="${p.postId}"></td>
	    <td th:text="${p.userId}"></td>
	    <td th:text="${p.content}"></td>
	</tr>
	</table>

</body>
</html>
